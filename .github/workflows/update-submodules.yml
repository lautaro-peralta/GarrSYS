name: Update Submodules

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_SYNC }}
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Actualizar submódulos y detectar cambios
        id: check_changes # ID clave para referenciarlo después
        run: |
          git submodule update --remote --recursive
          git add .
          if git diff --cached --quiet; then
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No hay cambios en los submódulos."
          else
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Se detectaron cambios en los submódulos."
          fi

      - name: Set date
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Crear Pull Request automático
        # Esta línea es la que hace la magia:
        if: steps.check_changes.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_SYNC }}
          branch: ci/update-submodules-${{ github.run_id }}
          base: main
          title: "chore: update submodule references (${{ env.DATE }})"
          body: |
            🤖 **Actualización automática de referencias de submódulos**

            - `apps/frontend` → Últimos cambios desde [`Tsplivalo/TGS-Frontend`](https://github.com/Tsplivalo/TGS-Frontend)
            - `apps/backend` → Últimos cambios desde [`lautaro-peralta/TGS-Backend`](https://github.com/lautaro-peralta/TGS-Backend)

            _Este pull request fue generado automáticamente por GitHub Actions._
          commit-message: "[create-pull-request] automated submodule update"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "lautaro-peralta <205333171+lautaro-peralta@users.noreply.github.com>"
          delete-branch: true
